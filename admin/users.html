<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Users</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="admin-layout">

    <aside class="admin-sidebar">
        <h2>Admin Panel</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="items.html">Items</a>
        <a href="users.html" class="active">Users</a>
        <a href="orders.html">Orders</a>
        <a href="discounts.html">Discount Codes</a>
        <a href="../index.html" style="margin-top:40px; color:#666;">← Back to Site</a>
    </aside>

    <main class="admin-main">
        <h1>Users</h1>

        <div class="admin-table-wrap">
            <div class="admin-table-header">
                <h2>All Users</h2>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-table">
                    <tr><td colspan="6" style="text-align:center; color:#aaa;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <h2>Edit User</h2>
        <div class="modal-form">
            <input type="hidden" id="user-id">
            <input type="text" id="user-username" placeholder="Username">
            <input type="email" id="user-email" placeholder="Email">
            <input type="text" id="user-firstname" placeholder="First Name">
            <input type="text" id="user-lastname" placeholder="Last Name">
            <label style="display:flex; align-items:center; gap:8px; font-size:14px;">
                <input type="checkbox" id="user-admin"> Admin
            </label>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" onclick="saveUser()">Save</button>
            </div>
        </div>
    </div>
</div>

<script>
    async function loadUsers() {
        const res  = await fetch('../backend/api/admin_users.php');
        const data = await res.json();
        const tbody = document.getElementById('users-table');

        if (!data.length) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#aaa;">No users found.</td></tr>';
            return;
        }

        tbody.innerHTML = data.map(u => `
            <tr>
                <td>${u.user_id}</td>
                <td>${u.username}</td>
                <td>${u.email}</td>
                <td>${u.first_name || ''} ${u.last_name || ''}</td>
                <td><span class="badge ${u.is_admin == 1 ? 'badge-admin' : 'badge-user'}">${u.is_admin == 1 ? 'Admin' : 'User'}</span></td>
                <td>
                    <button class="btn-edit" onclick='openModal(${JSON.stringify(u)})'>Edit</button>
                    <button class="btn-danger" onclick="deleteUser(${u.user_id})">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    function openModal(user) {
        document.getElementById('user-id').value        = user.user_id;
        document.getElementById('user-username').value  = user.username;
        document.getElementById('user-email').value     = user.email;
        document.getElementById('user-firstname').value = user.first_name || '';
        document.getElementById('user-lastname').value  = user.last_name  || '';
        document.getElementById('user-admin').checked   = user.is_admin == 1;
        document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('open');
    }

    async function saveUser() {
        const body = {
            user_id:    document.getElementById('user-id').value,
            username:   document.getElementById('user-username').value,
            email:      document.getElementById('user-email').value,
            first_name: document.getElementById('user-firstname').value,
            last_name:  document.getElementById('user-lastname').value,
            is_admin:   document.getElementById('user-admin').checked ? 1 : 0
        };

        const res  = await fetch('../backend/api/admin_users.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.success) { closeModal(); loadUsers(); }
        else alert(data.error || 'Something went wrong.');
    }

    async function deleteUser(id) {
        if (!confirm('Delete this user?')) return;
        const res  = await fetch('../backend/api/admin_users.php', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: id })
        });
        const data = await res.json();
        if (data.success) loadUsers();
        else alert(data.error || 'Something went wrong.');
    }

    loadUsers();
</script>
</body>
</html>
