<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - CDTeeShirts</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>CDTeeShirts</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <section class="cart-section">
        <h2>Your Cart</h2>

        <div id="cart-items"></div>

        <div class="cart-summary" id="cart-summary" style="display:none;">
            <div class="discount-row">
                <input type="text" id="discount-input" placeholder="Discount code">
                <button id="apply-discount">Apply</button>
                <button id="remove-discount" style="display:none; background:#eee; color:#333;">Remove</button>
            </div>
            <p class="discount-msg" id="discount-msg"></p>

            <div class="summary-row">
                <span>Subtotal</span>
                <span>$<span id="cart-subtotal">0.00</span></span>
            </div>
            <div class="summary-row" id="discount-row" style="display:none;">
                <span>Discount</span>
                <span>-$<span id="cart-discount">0.00</span></span>
            </div>
            <div class="summary-row">
                <span>Tax (8.25%)</span>
                <span>$<span id="cart-tax">0.00</span></span>
            </div>
            <div class="summary-row total">
                <span>Total</span>
                <span>$<span id="cart-total">0.00</span></span>
            </div>

            <button class="checkout-btn" id="checkout-btn">Proceed to Checkout</button>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 CDTeeShirts. All rights reserved.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
