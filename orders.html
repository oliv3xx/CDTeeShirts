<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Orders</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="admin-layout">

    <aside class="admin-sidebar">
        <h2>Admin Panel</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="items.html">Items</a>
        <a href="users.html">Users</a>
        <a href="orders.html" class="active">Orders</a>
        <a href="discounts.html">Discount Codes</a>
        <a href="index.html" style="margin-top:40px; color:#666;">← Back to Site</a>
    </aside>

    <main class="admin-main">
        <h1>Orders</h1>

        <div class="admin-table-wrap">
            <div class="admin-table-header">
                <h2>All Orders</h2>
                <div class="sort-controls">
                    <select id="sort-orders" onchange="loadOrders()">
                        <option value="order_date DESC">Newest First</option>
                        <option value="order_date ASC">Oldest First</option>
                        <option value="username ASC">Customer A-Z</option>
                        <option value="total DESC">Amount: High to Low</option>
                        <option value="total ASC">Amount: Low to High</option>
                    </select>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Date</th>
                        <th>Subtotal</th>
                        <th>Tax</th>
                        <th>Discount</th>
                        <th>Total</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="orders-table">
                    <tr><td colspan="8" style="text-align:center; color:#aaa;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

</div>

<script>
    async function loadOrders() {
        const sort = document.getElementById('sort-orders').value;
        const res  = await fetch(`admin_orders.php?sort=${encodeURIComponent(sort)}`);
        const data = await res.json();
        const tbody = document.getElementById('orders-table');

        if (!data.orders || !data.orders.length) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#aaa;">No orders yet.</td></tr>';
            return;
        }

        tbody.innerHTML = data.orders.map(o => `
            <tr>
                <td>#${o.order_id}</td>
                <td>${o.username}</td>
                <td>${new Date(o.order_date).toLocaleDateString()}</td>
                <td>$${parseFloat(o.subtotal).toFixed(2)}</td>
                <td>$${parseFloat(o.tax).toFixed(2)}</td>
                <td>$${parseFloat(o.discount_amount).toFixed(2)}</td>
                <td><strong>$${parseFloat(o.total).toFixed(2)}</strong></td>
                <td>
                    <select class="status-select" data-id="${o.order_id}" onchange="updateStatus(this)">
                        <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>Pending</option>
                        <option value="complete" ${o.status === 'complete' ? 'selected' : ''}>Complete</option>
                        <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                    </select>
                </td>
            </tr>
        `).join('');
    }

    async function updateStatus(select) {
        const order_id = select.getAttribute('data-id');
        const status   = select.value;

        const res  = await fetch('admin_orders.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ order_id, status })
        });
        const data = await res.json();
        if (!data.success) alert('Failed to update status.');
    }

    loadOrders();
</script>
</body>
</html>
