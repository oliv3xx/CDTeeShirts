<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CDTeeShirts</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>CDTeeShirts</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <div class="auth-wrapper">
    <section class="auth-section">

        <div class="auth-tabs">
            <button class="auth-tab active" onclick="showTab('login')">Login</button>
            <button class="auth-tab" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <form class="auth-form active" id="login-form">
            <input type="text" id="login-username" placeholder="Username" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit">Login</button>
            <p class="auth-message" id="login-message"></p>
        </form>

        <!-- Register Form -->
        <form class="auth-form" id="register-form">
            <div class="form-row">
                <input type="text" id="reg-firstname" placeholder="First Name">
                <input type="text" id="reg-lastname" placeholder="Last Name">
            </div>
            <input type="text" id="reg-username" placeholder="Username" required>
            <input type="email" id="reg-email" placeholder="Email" required>
            <input type="password" id="reg-password" placeholder="Password" required>
            <button type="submit">Create Account</button>
            <p class="auth-message" id="register-message"></p>
        </form>

    </section>
    </div>

    <footer>
        <p>&copy; 2026 CDTeeShirts. All rights reserved.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
