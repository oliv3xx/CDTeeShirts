<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - CDTeeShirts</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="admin-layout">

    <aside class="admin-sidebar">
        <h2>Admin Panel</h2>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="items.html">Items</a>
        <a href="users.html">Users</a>
        <a href="orders.html">Orders</a>
        <a href="discounts.html">Discount Codes</a>
        <a href="index.html" style="margin-top:40px; color:#666;">← Back to Site</a>
    </aside>

    <main class="admin-main">
        <h1>Dashboard</h1>

        <div class="stat-cards">
            <div class="stat-card">
                <h3>Total Orders</h3>
                <p id="stat-orders">—</p>
            </div>
            <div class="stat-card">
                <h3>Total Users</h3>
                <p id="stat-users">—</p>
            </div>
            <div class="stat-card">
                <h3>Total Items</h3>
                <p id="stat-items">—</p>
            </div>
            <div class="stat-card">
                <h3>Revenue</h3>
                <p id="stat-revenue">—</p>
            </div>
        </div>

        <div class="admin-table-wrap">
            <div class="admin-table-header">
                <h2>Recent Orders</h2>
                <a href="orders.html" style="font-size:14px; color:#666;">View all</a>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>User</th>
                        <th>Date</th>
                        <th>Total</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="recent-orders">
                    <tr><td colspan="5" style="text-align:center; color:#aaa;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

</div>

<script>
    async function loadDashboard() {
        try {
            const res  = await fetch('admin_orders.php');
            const data = await res.json();

            document.getElementById('stat-orders').textContent  = data.stats.total_orders  || 0;
            document.getElementById('stat-users').textContent   = data.stats.total_users   || 0;
            document.getElementById('stat-items').textContent   = data.stats.total_items   || 0;
            document.getElementById('stat-revenue').textContent = '$' + (parseFloat(data.stats.total_revenue) || 0).toFixed(2);

            const tbody = document.getElementById('recent-orders');
            if (!data.orders || data.orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#aaa;">No orders yet.</td></tr>';
                return;
            }

            tbody.innerHTML = data.orders.slice(0, 5).map(o => `
                <tr>
                    <td>#${o.order_id}</td>
                    <td>${o.username}</td>
                    <td>${new Date(o.order_date).toLocaleDateString()}</td>
                    <td>$${parseFloat(o.total).toFixed(2)}</td>
                    <td><span class="badge badge-${o.status === 'complete' ? 'complete' : 'pending'}">${o.status}</span></td>
                </tr>
            `).join('');
        } catch (err) {
            document.getElementById('recent-orders').innerHTML =
                '<tr><td colspan="5" style="text-align:center; color:#aaa;">Could not load data.</td></tr>';
        }
    }

    loadDashboard();
</script>
</body>
</html>
